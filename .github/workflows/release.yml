name: Release Module
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Validar module.json
        run: npx @arcvex/sdk validate
      - name: Testes
        run: npm ci && npm test
      - name: Criar ZIP
        run: |
          zip -r module-dias-embarcado-${{ github.ref_name }}.zip . \
            --exclude ".git/*" --exclude "node_modules/*" \
            --exclude ".github/*" --exclude "tests/*" \
            --exclude "coverage/*"
      - uses: softprops/action-gh-release@v2
        with:
          files: module-dias-embarcado-*.zip
